<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Flags - Search</title>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="Page with every flag in the world">
		<meta property="og:title" content="Flags - Home Page">
		<meta property="og:description" content="Page with every flag in the world">
		<meta property="og:type" content="website">
		<meta property="og:url" content="https://kri-droid.github.io/Flags/Search/">
		<meta property="og:image" content="ImgToHTML/ogimage.png">
		<link rel="canonical" href="https://kri-droid.github.io/Flags/Search/">
		<link rel="icon" href="ImgToHTML/favicon.png">
		<link rel="icon" type="image/png" sizes="16x16" href="ImgToHTML/favicon16x16.png">
		<link rel="icon" type="image/png" sizes="32x32" href="ImgToHTML/favicon32x32.png">
		<link rel="apple-touch-icon" href="ImgToHTML/apple-touch-icon.png">
		<style>
		html, body {
			overflow-x: hidden;
			margin: 0;
			padding: 0;
			text-align: center;
			font-family: "Times New Roman", sans-serif, Arial;
			user-select: none;  
		}
		/* Up menu */
		#upmenu {
			padding-left: 2%;
			display: flex;
			background-color: WhiteSmoke;
			width: 100%;
			height: 13vh;
			border-bottom: 1px solid Gainsboro;
			align-items: center;
			margin-bottom: 1vh;
		}
		#settingsBtn {
			display: flex;
			height: 70%;
			cursor: pointer;
			border: 1px solid Gainsboro;
			border-radius: 10px;
		}
		#homelinklink {
			display: flex;
			height: 65%;
			cursor: pointer;
			margin-left: 20px;
		}
		#homelink {
			width: 100%;
		}
		#changelogbtn {
			position: absolute;
			right: 1%;
			display: flex;
			height: 10%;
			cursor: pointer;
		}
		/* Showing from Up menu */
		#showlang {
			border: 1px solid black;
			border-radius: 7%;
			height: 70vh;
			width: 30%;
			position: absolute;
			left: 35%;
			top: 15%;
			display: none;
			background-color: white;
			z-index: 999;
			padding-top: 1%;
			box-shadow: 10px 7px 7px rgba(0,0,0,0.1);
		}
		#showlang.active {
			display: block;
		}
		.langimg {
			height: 13.5%;
			padding: 5%;
			cursor: pointer;
		}
		#changelog {
			padding: 1vh;
			border: 1px solid black;
			border-radius: 7%;
			height: 70vh;
			width: 50%;
			position: absolute;
			left: 25%;
			top: 15%;
			display: none;
			background-color: white;
			z-index: 999;
			padding-top: 1%;
			box-shadow: 10px 7px 7px rgba(0,0,0,0.1);
			overflow-y: auto; 
		}
		#changelog.active {
			display: block;
		}
		/*Strona*/
		#ukrytyDiv {
			display: none;
		}
		#border {
			border: 5px solid lightgray;
			padding: 10px;
			border-radius: 3%;
		}
		.numb {
			width: 60px;
		}
		#borcontent {
			display: flex;
			justify-content: center;
		}
		.heivpx {
			height: 1vh;
		}
		#visblit, #search {
			cursor: pointer;
		}
		#propwid, #prophei {
			font-style: italic;
			font-size: 10px;
		}
		#results {
		  display: flex;
		  flex-wrap: wrap;
		  padding: 1%;
		}
		.flaga {
		  width: 40%;
		  height: 30vh;
		}
		.wynik {
		  width: 58%;
		  height: 30vh;
		}

		</style>
	</head>
	<body>
		<div id="upmenu">
			<img id="settingsBtn" src="../ImgToHTML/settings.svg">
			<a id="homelinklink" href="https://kri-droid.github.io/Flags">
				<img id="homelink" src="../ImgToHTML/Favicon.svg">
			</a>
			<img id="changelogbtn" src="../ImgToHTML/changelog.svg">
		</div>
		<div id="showlang">
			<h1 id="langtext" style="display: flex; justify-content: center; align-items: center;">Language:</h1>
			<img src="../ImgToHTML/Wielka Brytania.svg" class="langimg" onclick="setLanguage('en')" alt="English">
			<img src="../ImgToHTML/Polska.svg" class="langimg" onclick="setLanguage('pl')" alt="Polish">
		</div>
		<div id="changelog">
			<h1 id="changelogtext">Changelog</h1>
			<a id="changecontent"></a>
		</div>
		<div id="borcontent">
			<div id="border">
				<div id="panstwowyszukaj">
					<a class="textlanf">Country:</a>
					<input id="country">
				</div>
				<div class="heivpx"></div>
				<div id="rokszukaj">
					<a class="textlanf">Years:</a>
					<input id="from" class="numb" oninput="numonly(from, true, false);">
					<a>-</a>
					<input id="to" class="numb" oninput="numonly(to, true, false);">
				</div>
				<div id="ukrytyDiv">
					<div class="heivpx"></div>
					<div id="propszukaj">
						<a class="textlanf">Aspect ratio:</a>
						<input id="prophei" class="numb" oninput="numonly(prophei, false, true);" placeholder="Height:">
						<a>:</a>
						<input id="propwid" class="numb" oninput="numonly(propwid, false, true);" placeholder="Width:">
					</div>
					<div class="heivpx"></div>
					<div>
						<a class="textlanf">Variant:</a>
						<select id="variantSelect">
							<option id="pop" class="textlanf" value="P">Most popular</option>
							<option id="all" class="textlanf" value="O">All official</option>
							<option id="unstand" class="textlanf" value="N">Unstandarized</option>
						</select>
					</div>
				</div>
			</div>
		<button id="visblit" onclick="bisible('visblit', 'ukrytyDiv', 0)">▼</button>
		<button id="search" onclick="search()">Search</button>
		</div>
		<br>
		<hr style="color: white;">
		<div id="results"></div>
		<script src="data.js"></script>
		<script src="index.js"></script>
	</body>
</html>
