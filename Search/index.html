<!DOCTYPE html>
<html>
	<head>
		<title>Flags - Search</title>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="Page with every flag in the world">
		<meta property="og:title" content="Flags - Search">
		<meta property="og:description" content="Page with every flag in the world">
		<meta property="og:type" content="website">
		<!--<meta property="og:url" content="">-->
		<!--<link rel="canonical" href="">-->
		<meta property="og:image" content="../ImgToHTML/ogimage.png">
		<link rel="icon" href="../ImgToHTML/favicon.png">
		<link rel="icon" type="image/png" sizes="16x16" href="../ImgToHTML/favicon16x16.png">
		<link rel="icon" type="image/png" sizes="32x32" href="../ImgToHTML/favicon32x32.png">
		<link rel="apple-touch-icon" href="../ImgToHTML/apple-touch-icon.png">
		<style>
		#showlang {
			border: 1px solid black;
			border-radius: 7%;
			height: 70vh;
			width: 30%;
			position: absolute;
			left: 35%;
			top: 15%;
			display: none;
			background-color: white;
			z-index: 999;
			padding-top: 1%;
			box-shadow: 10px 7px 7px rgba(0,0,0,0.1);
		}
		#showlang.active {
			display: block;
		}
		html, body {
			overflow-x: hidden;
			margin: 0;
			padding: 0;
			text-align: center;
			font-family: "Times New Roman", sans-serif, Arial;
		}
		#ukrytyDiv {
			display: none;
		}
		#border {
			border: 5px solid lightgray;
			padding: 10px;
			border-radius: 3%;
		}
		.numb {
			width: 60px;
		}
		#borcontent {
			display: flex;
			justify-content: center;
		}
		.heivpx {
			height: 5px;
		}
		.langimg {
			height: 40%;
			padding: 5%;
			cursor: pointer;
		}
		#visblit, #search {
			cursor: pointer;
		}
		a, p, h1, img, button {
			user-select: none;  
		}
		#propwid, #prophei {
			font-style: italic;
			font-size: 10px;
		}
		#settingsBtn {
			display: flex;
			height: 45px;
			cursor: pointer;
			z-index: 1000;
			border: 1px solid Gainsboro;
			border-radius: 10px;
		}
		#upmenu {
			padding-left: 2%;
			display: flex;
			background-color: WhiteSmoke;
			width: 100%;
			height: 10vh;
			border-bottom: 1px solid Gainsboro;
			align-items: center;
			margin-bottom: 1vh;
		}
		#homelink {
			display: flex;
			height: 40px;
			cursor: pointer;
			z-index: 1000;
			margin-left: 20px;
		}
		#LinkSearch {
			left: 42.5%;
			margin-top: 5%;
			position: absolute;
			width: 15%;
			aspect-ratio: 3 / 2;
			border-radius: 15%;
			object-fit: cover;
			font-size: 150%;
		}
		</style>
	</head>
	<body>
		<div id="upmenu">
			<img id="settingsBtn" src="../ImgToHTML/settings.svg">
			<a href="../index.html">
				<img id="homelink" src="../ImgToHTML/Favicon.svg">
			</a>
		</div>
		<div id="showlang">
			<h1 id="langtext" style="display: flex; justify-content: center; align-items: center;"></h1>
			<img src="../ImgToHTML/Wielka Brytania.svg" class="langimg" onclick="setLanguage('en')">
			<img src="../ImgToHTML/Polska.svg" class="langimg" onclick="setLanguage('pl')">
		</div>
		<div id="borcontent">
			<div id="border">
				<div id="panstwowyszukaj">
					<a class="textlanf"></a>
					<input id="country">
				</div>
				<div class="heivpx"></div>
				<div id="rokszukaj">
					<a class="textlanf"></a>
					<input id="from" class="numb" oninput="numonly(from, true, false);">
					<a>-</a>
					<input id="to" class="numb" oninput="numonly(to, true, false);">
				</div>
				<div id="ukrytyDiv">
					<div class="heivpx"></div>
					<div id="propszukaj">
						<a class="textlanf"></a>
						<input id="prophei" class="numb" oninput="numonly(prophei, false, true);">
						<a>:</a>
						<input id="propwid" class="numb" oninput="numonly(propwid, false, true);">
					</div>
					<div class="heivpx"></div>
					<div>
						<a class="textlanf"></a>
						<select id="variantSelect">
							<option id="pop" class="textlanf" value="P"></option>
							<option id="all" class="textlanf" value="O"></option>
							<option id="unstand" class="textlanf" value="N"></option>
						</select>
					</div>
				</div>
			</div>
		<button id="visblit" onclick="bisible('visblit', 'ukrytyDiv', 0)">▼</button>
		<button id="search" onclick="search()">Search</button>
		</div>
		<br>
		<script src="dane.js"></script>
		<script src="index.js"></script>
	</body>
</html>
