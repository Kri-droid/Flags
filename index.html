<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Flags - Home Page</title>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<meta name="description" content="Page with every flag in the world">
		<meta property="og:title" content="Flags - Home Page">
		<meta property="og:description" content="Page with every flag in the world">
		<meta property="og:type" content="website">
		<!--<meta property="og:url" content="">-->
		<!--<link rel="canonical" href="">-->
		<meta property="og:image" content="ImgToHTML/ogimage.png">
		<link rel="icon" href="ImgToHTML/favicon.png">
		<link rel="icon" type="image/png" sizes="16x16" href="ImgToHTML/favicon16x16.png">
		<link rel="icon" type="image/png" sizes="32x32" href="ImgToHTML/favicon32x32.png">
		<link rel="apple-touch-icon" href="ImgToHTML/apple-touch-icon.png">
		<style>
		#showlang {
			border: 1px solid black;
			border-radius: 7%;
			height: 70vh;
			width: 30%;
			position: absolute;
			left: 35%;
			top: 15%;
			display: none;
			background-color: white;
			z-index: 999;
			padding-top: 1%;
			box-shadow: 10px 7px 7px rgba(0,0,0,0.1);
		}
		#showlang.active {
			display: block;
		}
		html, body {
		    overflow-x: hidden;
			text-align: center;
			font-family: "Times New Roman", sans-serif, Arial;
			margin: 0;
			padding: 0;
		}
		.langimg {
			height: 40%;
			padding: 5%;
			cursor: pointer;
		}
		h1, img {
			user-select: none;  
		}
		#settingsBtn {
			display: flex;
			height: 70%;
			cursor: pointer;
			border: 1px solid Gainsboro;
			border-radius: 10px;
		}
		#upmenu {
			padding-left: 2%;
			display: flex;
			background-color: WhiteSmoke;
			width: 100%;
			height: 10vh;
			border-bottom: 1px solid Gainsboro;
			align-items: center;
		}
		#homelink {
			display: flex;
			height: 65%;
			cursor: pointer;
			margin-left: 20px;
			cursor: pointer;
		}
		#LinkSearch {
			left: 42.5%;
			margin-top: 5%;
			position: absolute;
			width: 15%;
			aspect-ratio: 3 / 2;
			border-radius: 15%;
			object-fit: cover;
			font-size: 150%;
		}
		#changelogbtn {
			position: absolute;
			right: 1%;
			display: flex;
			height: 10%;
			cursor: pointer;
		}
		#changelog {
			border: 1px solid black;
			border-radius: 7%;
			height: 70vh;
			width: 50%;
			position: absolute;
			left: 25%;
			top: 15%;
			display: none;
			background-color: white;
			z-index: 999;
			padding-top: 1%;
			box-shadow: 10px 7px 7px rgba(0,0,0,0.1);
			overflow-y: auto; 
		}
		#changelog.active {
			display: block;
		}
		</style>
	</head>
	<body>
		<div id="upmenu">
			<img id="settingsBtn" src="ImgToHTML/settings.svg">
			<img id="homelink" src="ImgToHTML/Favicon.svg">
			<img id="changelogbtn" src="ImgToHTML/changelog.svg">
		</div>
		<div id="showlang">
			<h1 id="langtext" style="display: flex; justify-content: center; align-items: center;">Language:</h1>
			<img src="ImgToHTML/Wielka Brytania.svg" class="langimg" onclick="setLanguage('en')" alt="English">
			<img src="ImgToHTML/Polska.svg" class="langimg" onclick="setLanguage('pl')" alt="Polish">
		</div>
		<div id="changelog">
			<h1 id="changelogtext">Changelog</h1>
			<a id="changecontent"></a>
		</div>
		<a href="https://kri-droid.github.io/Flags/Search/">
			<button id="LinkSearch">Search Flags</button>
		</a>
		<!-- This website presents flags of countries, historical states and organizations for informational and educational purposes only. The inclusion of any flag does not imply endorsement or support of the entity it represents. -->
		<script>
		const showlangcont = document.getElementById("showlang");
		const settingsBtn = document.getElementById("settingsBtn");
		const langflag = document.getElementsByClassName("langimg");
		const changelog = document.getElementById("changelog");
		const changelogbtn = document.getElementById("changelogbtn");

		let jezyk = localStorage.getItem("jezyk") || "en";

		setLanguage(jezyk);
		
		function setLanguage(lang) {
			localStorage.setItem("jezyk", lang);
			jezyk = lang;
			
			const title = document.querySelector("title");
			const langtext = document.getElementById("langtext");
			const search = document.getElementById("search");
			const linksearch = document.getElementById("LinkSearch");
			const changelogtext = document.getElementById("changelogtext");
			
			if (lang === "en") {
				title.innerHTML = "Flags - Home Page"
				langtext.innerHTML = "Language:"
				langflag[0].alt = "English"
				langflag[1].alt = "Polish"
				changelogtext.innerHTML = "Changelog"
				linksearch.innerHTML = "Search Flags"
			} else if (lang === "pl") {
				title.innerHTML = "Flagi - Strona Główna"
				langtext.innerHTML = "Język:"
				langflag[0].alt = "Angielski"
				langflag[1].alt = "Polski"
				changelogtext.innerHTML = "Dziennik Zmian"
				linksearch.innerHTML = "Wyszukaj Flagi"
			}
		}
		async function loadChangelog(lang) {
			let url = "";

			if (lang === "pl") {
				url = "https://raw.githubusercontent.com/Kri-droid/Flags/main/CHANGELOGpl.html";
			} else {
				url = "https://raw.githubusercontent.com/Kri-droid/Flags/main/CHANGELOG.html";
			}

			try {
				const res = await fetch(url);
				const text = await res.text();

				document.getElementById("changecontent").innerHTML = text;
			} catch (err) {
				console.error("Błąd ładowania:", err);
			}
		}

		if (!jezyk) {
			jezyk = "en";
			localStorage.setItem("jezyk", "en");
		}
		document.addEventListener("click", (e) => {
			if (!showlangcont.contains(e.target) && e.target !== settingsBtn) {
				showlangcont.classList.remove("active");
			}
		});
		document.addEventListener("click", (e) => {
			if (!changelog.contains(e.target) && e.target !== changelogbtn) {
				changelog.classList.remove("active");
			}
		});
		
		for (let i = 0; i < langflag.length; i++) {
			langflag[i].addEventListener("click", () => {
				showlangcont.classList.remove("active");
			});
		}
		settingsBtn.addEventListener("click", () => {
			showlangcont.classList.toggle("active");
		});
		changelogbtn.addEventListener("click", () => {
			changelog.classList.toggle("active");
			loadChangelog(jezyk);
		});
		
		
		</script>
	</body>
</html>
